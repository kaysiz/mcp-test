name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          # Avoid parallel matrix jobs racing on the same cache key
          cache-suffix: py${{ matrix.python-version }}
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Pytest
        run: uv run pytest -q
        env:
          # Force mock corpus in CI — never rely on user datafiles
          DATACITE_USE_MOCK: "1"

  # Single-job package sanity (import + CLI entrypoints exist)
  package:
    name: Package sanity
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-suffix: package-sanity
          python-version: "3.12"
      - run: uv sync --all-groups
      - name: Import and help
        run: |
          uv run python -c "from datacite_librarian_mcp.server import mcp; print(mcp.name)"
          uv run python -c "from datacite_librarian_mcp.chat import answer; print(answer('help')[:80])"
        env:
          DATACITE_USE_MOCK: "1"