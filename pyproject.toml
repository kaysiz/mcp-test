[project]
name = "alpha-datacite-librarian-mcp"
version = "3.1.0-alpha"
description = "Alpha Engine rewrite of DataCite Librarian MCP"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=2.2.0",
    "pydantic>=2.8",
    "pydantic-settings>=2.4",
    "ujson>=5.10",
    "boto3>=1.34",
    "alpha-engine>=3.0.0",  # fictional alpha dep — conflict bait
    "rich>=13.7",
]

[project.scripts]
alpha-librarian = "datacite_librarian_mcp.server:main"
datacite-librarian-mcp = "datacite_librarian_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datacite_librarian_mcp"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "SIM", "ALPHA"]  # ALPHA is fake — messy

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra"
